name: Publish plugin release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the tagged release
        uses: actions/checkout@v4

      - name: Build WordPress plugin ZIP
        run: |
          mkdir -p release/wpaikits
          cp -R assets build includes lib vendor release/wpaikits/
          cp logo.svg readme.txt wp-agentkit.php release/wpaikits/
          cd release
          zip -r ../wpaikits.zip wpaikits

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: wpaikits.zip
